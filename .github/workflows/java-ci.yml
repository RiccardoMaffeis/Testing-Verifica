name: Java CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Show Java, Chrome and ChromeDriver versions
        run: |
          java -version
          google-chrome --version
          chromedriver --version
          which chromedriver

      - name: Set ChromeDriver path
        run: |
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV

      - name: Create folders
        run: |
          mkdir -p lib
          mkdir -p bin
          mkdir -p ci-stubs/org/jmlspecs/annotation

      - name: Download JUnit 5 Console Standalone
        run: |
          curl -L -o lib/junit-platform-console-standalone.jar \
            https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.1/junit-platform-console-standalone-1.10.1.jar

      - name: Create temporary CodeBigintMath annotation
        run: |
          cat > ci-stubs/org/jmlspecs/annotation/CodeBigintMath.java <<'EOF'
          package org.jmlspecs.annotation;

          import java.lang.annotation.ElementType;
          import java.lang.annotation.Retention;
          import java.lang.annotation.RetentionPolicy;
          import java.lang.annotation.Target;

          @Retention(RetentionPolicy.RUNTIME)
          @Target({ElementType.TYPE, ElementType.METHOD, ElementType.CONSTRUCTOR})
          public @interface CodeBigintMath {
          }
          EOF

      - name: Build Selenium classpath
        run: |
          SELENIUM_CP=$(find Codice/Java/Progetto/lib/selenium -name "*.jar" | paste -sd ":" -)
          echo "SELENIUM_CP=$SELENIUM_CP" >> $GITHUB_ENV
          echo "Selenium classpath:"
          echo "$SELENIUM_CP"

      - name: Compile source and tests
        run: |
          javac \
            -cp "lib/junit-platform-console-standalone.jar:${SELENIUM_CP}" \
            -d bin \
            $(find ci-stubs Codice/Java/Progetto/src -name "*.java")

      - name: Copy webapp files
        run: |
          cp -r Codice/Java/Progetto/webapp ./webapp

      - name: Run JUnit and Selenium tests
        env:
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
        run: |
          java \
            -jar lib/junit-platform-console-standalone.jar \
            --class-path "bin:${SELENIUM_CP}" \
            --scan-class-path
