name: Java CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create folders
        run: |
          mkdir -p lib
          mkdir -p bin

      - name: Download JUnit 5 Console Standalone
        run: |
          curl -L -o lib/junit-platform-console-standalone.jar \
            https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.1/junit-platform-console-standalone-1.10.1.jar

      - name: Download OpenJML release
        run: |
          curl -L -o openjml.zip \
            https://github.com/OpenJML/OpenJML/releases/latest/download/openjml-ubuntu-22.04-21.zip
          unzip openjml.zip -d openjml

      - name: Find JML runtime
        run: |
          find openjml -name "jmlruntime.jar"
          cp $(find openjml -name "jmlruntime.jar" | head -n 1) lib/jmlruntime.jar

      - name: Compile source and tests
        run: |
          javac \
            -cp "lib/junit-platform-console-standalone.jar:lib/jmlruntime.jar" \
            -d bin \
            $(find Codice/Java/Progetto/src -name "*.java")

      - name: Run JUnit tests
        run: |
          java \
            -jar lib/junit-platform-console-standalone.jar \
            --class-path "bin:lib/jmlruntime.jar" \
            --scan-class-path
